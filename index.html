<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d2a20">
    <title>سبحة الروح - تطبيق التسبيح الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #071a14;
            font-family: -apple-system, 'Segoe UI', 'Amiri', 'SF Pro Arabic', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        /* هيكل التطبيق بالكامل - يبدو كتطبيق أصلي */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 780px;
            background: linear-gradient(145deg, #0c231c 0%, #071a14 100%);
            border-radius: 44px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.5), 0 0 0 6px #2a4238, 0 0 0 12px #0f2a22;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* حالة الشاشة العلوية (Dynamic Island-like) */
        .status-bar {
            padding: 14px 24px 8px;
            display: flex;
            justify-content: space-between;
            color: #ecd68a;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* الهيدر */
        .app-header {
            padding: 8px 24px 12px;
            border-bottom: 1px solid #dbb45c30;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .app-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f3da9b, #ca9f3e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-badge {
            background: #1f3a30;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #e3c97a;
        }

        /* منطقة المحتوى الرئيسية - قابلة للتمرير */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 10px;
            scrollbar-width: thin;
        }

        /* ========== شاشة السبحة الرئيسية ========== */
        .tasbeeh-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 20px;
        }

        .counter-circle {
            background: #05120e;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,215,0,0.3), 0 0 0 4px #dbb258;
            margin: 16px 0;
        }
        .counter-number {
            font-size: 4.8rem;
            font-weight: 900;
            color: #ffe4a3;
            font-family: monospace;
            letter-spacing: 6px;
        }
        .counter-label {
            font-size: 0.8rem;
            color: #c4aa64;
        }

        .tasbeeh-bead-large {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 35% 30%, #f3da8c, #c4922e);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 -8px 0 #7a551f, inset 0 2px 10px rgba(255,245,180,0.9);
            transition: 0.03s linear;
            margin: 20px 0;
        }
        .tasbeeh-bead-large:active {
            transform: scale(0.95);
        }
        .bead-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2c2412;
        }
        .bead-sub {
            font-size: 0.8rem;
            color: #4a3a1a;
        }

        .action-row {
            display: flex;
            gap: 24px;
            margin-top: 16px;
        }
        .action-btn {
            background: #202f28;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: #f9e2a4;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.96); background: #2e463a; }

        /* بطاقات الأذكار على شكل تطبيق */
        .section-title {
            font-size: 1rem;
            color: #eccf85;
            margin: 20px 0 12px 8px;
            font-weight: 600;
        }
        .dhikr-card {
            background: #11271f;
            border-radius: 28px;
            padding: 16px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border-right: 5px solid #e7bc60;
        }
        .dhikr-text {
            font-size: 1rem;
            font-weight: 500;
            color: #fff4e0;
            flex: 2;
            line-height: 1.4;
        }
        .dhikr-counter {
            background: #030f0b;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: bold;
            color: #ffdf94;
            font-size: 1rem;
            min-width: 65px;
            text-align: center;
        }
        .dhikr-plus {
            background: #e9bc64;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            color: #1d2f24;
        }
        .dhikr-plus:active { transform: scale(0.92); background: #cb9a3e; }

        /* شريط التنقل السفلي - مثل تطبيقات الجوال */
        .bottom-nav {
            background: #0a211ab3;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 22px;
            border-top: 1px solid #dbb85c40;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #ad9f70;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: 0.1s;
        }
        .nav-item.active {
            color: #f5d97a;
            background: #2f4a3c60;
        }
        .nav-icon {
            font-size: 1.6rem;
        }

        /* التمرير الناعم */
        .main-content::-webkit-scrollbar {
            width: 3px;
        }
        .main-content::-webkit-scrollbar-track {
            background: #1c332a;
            border-radius: 10px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #dbaa44;
        }

        /* إخفاء المحتوى حسب التبويب */
        .page {
            display: none;
            animation: pageSlide 0.2s ease;
        }
        .page.active-page {
            display: block;
        }
        @keyframes pageSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋 100%</span>
    </div>
    <div class="app-header">
        <div class="app-title">سَبِّحْ</div>
        <div class="date-badge" id="hijriDate">الخميس ١٤٤٧</div>
    </div>

    <div class="main-content">
        <!-- صفحة التسبيح -->
        <div id="page-tasbeeh" class="page active-page">
            <div class="tasbeeh-screen">
                <div class="counter-circle">
                    <div class="counter-number" id="mainCounter">0</div>
                    <div class="counter-label">تسبيحة</div>
                </div>
                <div class="tasbeeh-bead-large" id="bigBead">
                    <div class="bead-text">۞ سُبْحَانَ اللَّه ۞</div>
                    <div class="bead-sub">اضغط للتسبيح</div>
                </div>
                <div class="action-row">
                    <button class="action-btn" id="resetCounterBtn">🗑️ إعادة ضبط</button>
                </div>
            </div>
        </div>

        <!-- صفحة أذكار الصباح -->
        <div id="page-morning" class="page">
            <div class="section-title">☀️ أذكار الصباح</div>
            <div id="morningListContainer"></div>
        </div>

        <!-- صفحة أذكار المساء -->
        <div id="page-evening" class="page">
            <div class="section-title">🌙 أذكار المساء</div>
            <div id="eveningListContainer"></div>
        </div>

        <!-- صفحة الأدعية -->
        <div id="page-dua" class="page">
            <div class="section-title">🤲 جوامع الدعاء</div>
            <div id="duaListContainer"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-page="page-tasbeeh">
            <div class="nav-icon">📿</div>
            <span>تسبيح</span>
        </button>
        <button class="nav-item" data-page="page-morning">
            <div class="nav-icon">☀️</div>
            <span>صباح</span>
        </button>
        <button class="nav-item" data-page="page-evening">
            <div class="nav-icon">🌙</div>
            <span>مساء</span>
        </button>
        <button class="nav-item" data-page="page-dua">
            <div class="nav-icon">🤲</div>
            <span>دعاء</span>
        </button>
    </div>
</div>

<script>
    // =============== بيانات التطبيق ===============
    let tasbeehCount = 0;

    const morningDhikr = [
        { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ", count: 0 },
        { text: "أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ", count: 0 },
        { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا", count: 0 },
        { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ", count: 0 },
        { text: "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ", count: 0 }
    ];

    const eveningDhikr = [
        { text: "سُبْحَانَ اللَّهِ الْعَظِيمِ", count: 0 },
        { text: "أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ", count: 0 },
        { text: "اللَّهُمَّ بِكَ أَمْسَيْنَا", count: 0 },
        { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ", count: 0 },
        { text: "لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ", count: 0 }
    ];

    const duaList = [
        { text: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً", count: 0 },
        { text: "اللَّهُمَّ اغْفِرْ لِي وَارْحَمْنِي", count: 0 },
        { text: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ", count: 0 },
        { text: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ", count: 0 },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ", count: 0 }
    ];

    // حالات
    let morningState = morningDhikr.map(i => ({ ...i }));
    let eveningState = eveningDhikr.map(i => ({ ...i }));
    let duaState = duaList.map(i => ({ ...i }));

    // عناصر
    const mainCounterSpan = document.getElementById('mainCounter');
    const bigBead = document.getElementById('bigBead');
    const resetBtn = document.getElementById('resetCounterBtn');

    function updateMainCounter() {
        mainCounterSpan.innerText = tasbeehCount;
    }

    bigBead.addEventListener('click', () => {
        tasbeehCount++;
        updateMainCounter();
        // تأثير اهتزاز خفيف
        bigBead.style.transform = 'scale(0.96)';
        setTimeout(() => { bigBead.style.transform = ''; }, 80);
    });

    resetBtn.addEventListener('click', () => {
        tasbeehCount = 0;
        updateMainCounter();
    });

    // دالة عرض الأذكار كبطاقات تطبيق
    function renderDhikrCards(containerId, dataArray, typePrefix) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        dataArray.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'dhikr-card';
            card.innerHTML = `
                <div class="dhikr-text">${item.text}</div>
                <div class="dhikr-counter" id="${typePrefix}-count-${idx}">${item.count}</div>
                <button class="dhikr-plus" data-type="${typePrefix}" data-index="${idx}">+</button>
            `;
            container.appendChild(card);
        });

        // ربط الأحداث
        document.querySelectorAll(`.dhikr-plus[data-type="${typePrefix}"]`).forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = btn.getAttribute('data-type');
                const index = parseInt(btn.getAttribute('data-index'));
                if (type === 'morning') {
                    morningState[index].count++;
                    document.getElementById(`morning-count-${index}`).innerText = morningState[index].count;
                } else if (type === 'evening') {
                    eveningState[index].count++;
                    document.getElementById(`evening-count-${index}`).innerText = eveningState[index].count;
                } else if (type === 'dua') {
                    duaState[index].count++;
                    document.getElementById(`dua-count-${index}`).innerText = duaState[index].count;
                }
                btn.style.transform = 'scale(0.9)';
                setTimeout(() => btn.style.transform = '', 100);
            });
        });
    }

    // تحديث كل القوائم
    function refreshAllCards() {
        renderDhikrCards('morningListContainer', morningState, 'morning');
        renderDhikrCards('eveningListContainer', eveningState, 'evening');
        renderDhikrCards('duaListContainer', duaState, 'dua');
    }

    // التنقل بين الصفحات (شريط سفلي)
    function switchToPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active');
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const targetPage = item.getAttribute('data-page');
            if (targetPage) switchToPage(targetPage);
        });
    });

    // تاريخ هجري وهمي ديناميكي (تلقائي)
    function updateHijriDate() {
        const date = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const greg = date.toLocaleDateString('ar-EG', options);
        document.getElementById('hijriDate').innerText = greg + ' هـ';
    }
    updateHijriDate();

    // تهيئة التطبيق
    refreshAllCards();
    updateMainCounter();
</script>
</body>
</html>
