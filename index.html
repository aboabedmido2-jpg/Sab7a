<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسبيحة النور | السّبحة الإلكترونية الفريدة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1f1a 0%, #0c2b21 50%, #071712 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Amiri', 'Tahoma', 'Times New Roman', serif;
            padding: 1.5rem;
            position: relative;
        }

        /* زخرفة إسلامية خلفية */
        body::before {
            content: "﷽";
            position: fixed;
            font-size: 18vw;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(218, 165, 32, 0.03);
            pointer-events: none;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.08) 1.5px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* الحاوية الأساسية - قبة إسلامية */
        .islamic-masterpiece {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 620px;
            background: rgba(13, 27, 23, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 85px 85px 65px 65px;
            box-shadow: 0 40px 65px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,0,0.3), 0 0 0 2px rgba(212, 175, 55, 0.3);
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        /* الهلال والنجمة */
        .crescent {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.9rem;
            filter: drop-shadow(0 0 6px gold);
            text-shadow: 0 0 8px #ffd966;
            z-index: 25;
            background: rgba(10,25,20,0.7);
            border-radius: 100px;
            padding: 0 15px;
            color: #f5cb5c;
        }

        /* رؤوس التابات بلمسة عربية */
        .tabs-royal {
            display: flex;
            background: #0e2a22;
            padding: 18px 12px 0 12px;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 2px solid #d4af37;
        }

        .islamic-tab {
            flex: 1;
            min-width: 90px;
            background: rgba(0,0,0,0.55);
            border: 1px solid #c9a03d;
            padding: 12px 6px;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Amiri', 'Segoe UI', serif;
            color: #ecd9b4;
            cursor: pointer;
            border-radius: 45px 45px 25px 25px;
            transition: all 0.2s;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .islamic-tab.active {
            background: radial-gradient(ellipse at top, #f7e5b5, #cfb053);
            color: #0a2b1f;
            border-color: #f8d568;
            box-shadow: 0 -6px 12px rgba(0,0,0,0.2), inset 0 1px 2px #fff2ce;
            text-shadow: 0 0 2px gold;
        }

        /* محتوى ذهبي */
        .gold-content {
            display: none;
            padding: 28px 18px 40px;
            animation: fadeInUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .gold-content.active {
            display: block;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(14px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        /* تصميم السبحة - حبات ذهبية ثلاثية الأبعاد */
        .tasbeeh-core {
            text-align: center;
        }

        .tasbeeh-title {
            font-size: 1.5rem;
            color: #f7e2b0;
            font-weight: bold;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e4c580, #b58d3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .counter-gold {
            font-size: 5.2rem;
            font-weight: 900;
            background: #071d18;
            display: inline-block;
            padding: 0.2rem 1.6rem;
            border-radius: 80px;
            color: #fad15e;
            font-family: monospace;
            letter-spacing: 8px;
            margin: 15px 0;
            border: 1px solid #d4b85c;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7), 0 8px 14px black;
        }

        .bead-oriental {
            background: radial-gradient(circle at 35% 35%, #f3cf7a, #bd913f);
            width: 155px;
            height: 155px;
            margin: 15px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 -8px 0 #6f511f, inset 0 2px 10px rgba(255,245,190,0.8);
            transition: all 0.03s linear;
            font-size: 2rem;
            font-weight: bold;
            color: #2a2b0e;
            text-shadow: 0 1px 2px #ffeecc;
            flex-direction: column;
        }

        .bead-oriental:active {
            transform: scale(0.94);
            box-shadow: inset 0 5px 12px #4f3a18;
        }

        .small-bead-text {
            font-size: 0.9rem;
            margin-top: 6px;
            color: #2f2412;
        }

        .reset-gold {
            background: #2f2a1f;
            border: 1px solid #c8a233;
            padding: 10px 36px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: #f7e4bb;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.1s;
        }

        .reset-gold:active {
            transform: scale(0.96);
            background: #1f1b12;
        }

        /* قائمة الأذكار بروحانية عالية */
        .dhikr-premium {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 460px;
            overflow-y: auto;
            padding-left: 5px;
        }

        .dhikr-premium::-webkit-scrollbar {
            width: 5px;
        }

        .dhikr-premium::-webkit-scrollbar-track {
            background: #1b342c;
            border-radius: 10px;
        }

        .dhikr-premium::-webkit-scrollbar-thumb {
            background: #e5ba5e;
            border-radius: 10px;
        }

        .dhikr-card-islamic {
            background: linear-gradient(115deg, #182d26, #0f231d);
            border-right: 6px solid #efc46e;
            padding: 18px 20px;
            border-radius: 48px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            transition: 0.1s;
        }

        .dhikr-text-ar {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fef1cf;
            font-family: 'Amiri', 'Times New Roman', serif;
            line-height: 1.5;
            flex: 2;
        }

        .counter-islamic-badge {
            background: #00000070;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 80px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #f7d166;
            font-family: monospace;
            border: 1px solid #d0ab54;
        }

        .btn-dhikr-gold {
            background: #dbaa44;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.05s linear;
            color: #202010;
            font-family: inherit;
        }

        .btn-dhikr-gold:active {
            transform: scale(0.93);
            background: #b8862c;
        }

        /* توقيع أنيق */
        .islamic-footer {
            text-align: center;
            background: #061812cc;
            padding: 14px;
            font-size: 0.75rem;
            color: #cfbc86;
            border-top: 0.5px solid #cfb051;
            font-family: 'Amiri', serif;
        }

        @media (max-width: 520px) {
            .islamic-tab { font-size: 0.7rem; min-width: 70px; padding: 8px 3px;}
            .bead-oriental { width: 120px; height: 120px; font-size: 1.5rem; }
            .counter-gold { font-size: 3.5rem; letter-spacing: 4px; }
            .dhikr-text-ar { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="islamic-masterpiece">
    <div class="crescent">☪️ تسبيحة النور ☪️</div>
    <div class="tabs-royal">
        <button class="islamic-tab active" data-tab="tasbeeh-tab">📿 السّبحة الذهبية</button>
        <button class="islamic-tab" data-tab="morning-tab">🌤️ أذكار الصباح</button>
        <button class="islamic-tab" data-tab="evening-tab">🌙 أذكار المساء</button>
        <button class="islamic-tab" data-tab="dua-tab">🤲 جوامع الدعاء</button>
    </div>

    <!-- السبحة -->
    <div id="tasbeeh-tab" class="gold-content active">
        <div class="tasbeeh-core">
            <div class="tasbeeh-title">• سُبْحَانَ اللَّهِ •</div>
            <div class="counter-gold" id="tasbeehCounterUI">0</div>
            <div class="bead-oriental" id="gloriousBead">
                <span>🤲</span>
                <span class="small-bead-text">إضغط للتسبيح</span>
            </div>
            <button class="reset-gold" id="resetTasbeehBtn">⟳ تجديد العداد</button>
        </div>
    </div>

    <!-- أذكار الصباح -->
    <div id="morning-tab" class="gold-content">
        <div class="dhikr-premium" id="morningContainer"></div>
    </div>

    <!-- أذكار المساء -->
    <div id="evening-tab" class="gold-content">
        <div class="dhikr-premium" id="eveningContainer"></div>
    </div>

    <!-- أدعية -->
    <div id="dua-tab" class="gold-content">
        <div class="dhikr-premium" id="duaContainer"></div>
    </div>
    <div class="islamic-footer">﴿ وَالذَّاكِرِينَ اللَّهَ كَثِيرًا وَالذَّاكِرَاتِ ﴾</div>
</div>

<script>
    // ======================== بيانات إسلامية أصيلة ========================
    const morningAdhkar = [
        { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ", count: 0 },
        { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا", count: 0 },
        { text: "أَصْبَحْنَا عَلَى فِطْرَةِ الإِسْلَامِ وَكَلِمَةِ الإِخْلَاصِ", count: 0 },
        { text: "رَضِيتُ بِاللَّهِ رَبًّا وَبِالْإِسْلَامِ دِينًا", count: 0 },
        { text: "حَسْبِيَ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ", count: 0 },
        { text: "سُبْحَانَ اللَّهِ الْعَظِيمِ وَبِحَمْدِهِ", count: 0 }
    ];

    const eveningAdhkar = [
        { text: "أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ", count: 0 },
        { text: "اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ نَحْيَا", count: 0 },
        { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ", count: 0 },
        { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ", count: 0 },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ", count: 0 }
    ];

    const duaCollection = [
        { text: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً", count: 0 },
        { text: "اللَّهُمَّ اغْفِرْ لِي وَارْحَمْنِي وَاهْدِنِي", count: 0 },
        { text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ", count: 0 },
        { text: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ", count: 0 },
        { text: "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ", count: 0 }
    ];

    let tasbeehMain = 0;

    // نسخ متابعة الحالة
    let morningState = morningAdhkar.map(item => ({ ...item }));
    let eveningState = eveningAdhkar.map(item => ({ ...item }));
    let duaState = duaCollection.map(item => ({ ...item }));

    // دوال مساعدة
    function updateTasbeehUI() {
        document.getElementById('tasbeehCounterUI').innerText = tasbeehMain;
    }

    function renderIslamicList(containerId, dataArray, typePrefix) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        dataArray.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'dhikr-card-islamic';
            card.innerHTML = `
                <div class="dhikr-text-ar">📿 ${item.text}</div>
                <div class="counter-islamic-badge" id="${typePrefix}-badge-${idx}">${item.count}</div>
                <button class="btn-dhikr-gold" data-type="${typePrefix}" data-idx="${idx}">➕ تسبيحة</button>
            `;
            container.appendChild(card);
        });

        // attach events
        document.querySelectorAll(`.btn-dhikr-gold[data-type="${typePrefix}"]`).forEach(btn => {
            btn.addEventListener('click', (e) => {
                const pType = btn.getAttribute('data-type');
                const index = parseInt(btn.getAttribute('data-idx'));
                if (pType === 'morning') {
                    morningState[index].count++;
                    document.getElementById(`morning-badge-${index}`).innerText = morningState[index].count;
                } else if (pType === 'evening') {
                    eveningState[index].count++;
                    document.getElementById(`evening-badge-${index}`).innerText = eveningState[index].count;
                } else if (pType === 'dua') {
                    duaState[index].count++;
                    document.getElementById(`dua-badge-${index}`).innerText = duaState[index].count;
                }
                // إضافة تأثير صوتي رمزي (اهتزاز الزر)
                btn.style.transform = 'scale(0.92)';
                setTimeout(() => btn.style.transform = '', 80);
            });
        });
    }

    function refreshAllIslamic() {
        renderIslamicList('morningContainer', morningState, 'morning');
        renderIslamicList('eveningContainer', eveningState, 'evening');
        renderIslamicList('duaContainer', duaState, 'dua');
    }

    // Eventos التابات
    function activateTab(tabId) {
        document.querySelectorAll('.gold-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.islamic-tab').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.islamic-tab[data-tab="${tabId}"]`).classList.add('active');
    }

    // ربط أزرار التابات
    document.querySelectorAll('.islamic-tab').forEach(tabBtn => {
        tabBtn.addEventListener('click', () => {
            const target = tabBtn.getAttribute('data-tab');
            if (target) activateTab(target);
        });
    });

    // السبحة الرئيسية
    const beadDiv = document.getElementById('gloriousBead');
    const resetTasbeeh = document.getElementById('resetTasbeehBtn');

    beadDiv.addEventListener('click', () => {
        tasbeehMain++;
        updateTasbeehUI();
        // تأثير النقر على الحبة
        beadDiv.style.transform = 'scale(0.94)';
        setTimeout(() => beadDiv.style.transform = '', 70);
    });

    resetTasbeeh.addEventListener('click', () => {
        tasbeehMain = 0;
        updateTasbeehUI();
    });

    // تهيئة كاملة
    refreshAllIslamic();
    updateTasbeehUI();
</script>
</body>
    </html>
