<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسبيحة القدس | أعظم سبحة إلكترونية في التاريخ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a1f1a, #030c09);
            font-family: 'Times New Roman', 'Amiri', 'Scheherazade', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* المسجد المتحرك في الخلفية */
        .mosque-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 30px, 
                rgba(212, 175, 55, 0.08) 30px, 
                rgba(212, 175, 55, 0.08) 60px);
            pointer-events: none;
        }

        .mosque-bg::before {
            content: "🌙";
            position: absolute;
            top: -50px;
            right: 20px;
            font-size: 80px;
            opacity: 0.2;
            animation: floatMoon 8s infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* الحاوية الرئيسية - تصميم محراب */
        .mihrab {
            max-width: 800px;
            width: 100%;
            background: linear-gradient(145deg, rgba(20, 35, 28, 0.92), rgba(8, 20, 15, 0.96));
            backdrop-filter: blur(12px);
            border-radius: 60px 60px 100px 100px;
            box-shadow: 0 40px 70px rgba(0,0,0,0.7), 
                        0 0 0 3px #d4af37,
                        0 0 0 8px #2a3a30,
                        inset 0 1px 4px rgba(255,215,0,0.3);
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        /* قبة المسجد */
        .dome {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px;
            background: radial-gradient(ellipse at 50% 0%, #d4af37, #8b691b);
            border-radius: 120px 120px 50px 50px;
            box-shadow: 0 -5px 20px rgba(255,215,0,0.4);
        }
        .dome::after {
            content: "☪️";
            position: absolute;
            top: -28px;
            left: 40px;
            font-size: 32px;
            filter: drop-shadow(0 0 4px gold);
        }

        /* التابات بتأثير زجاجي */
        .noble-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 30px 20px 12px 20px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.25);
            border-radius: 50px 50px 0 0;
        }

        .tab-noble {
            background: rgba(0,0,0,0.5);
            border: 1px solid #b8942e;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: #ecd9a3;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            backdrop-filter: blur(4px);
            min-width: 100px;
        }

        .tab-noble.active {
            background: linear-gradient(135deg, #ecca6c, #c49b38);
            color: #0a2b1a;
            border-color: #fff3cf;
            box-shadow: 0 0 15px rgba(212,175,55,0.6);
            text-shadow: none;
        }

        /* المحتوى الرئيسي */
        .sacred-content {
            display: none;
            padding: 30px 25px 45px;
            animation: mysticalFade 0.35s ease;
        }

        .sacred-content.active {
            display: block;
        }

        @keyframes mysticalFade {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ========== السبحة ثلاثية الأبعاد ========== */
        .tasbeeh-throne {
            text-align: center;
        }

        .tasbeeh-glow {
            font-size: 1.7rem;
            color: #e7c877;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .pearl-counter {
            font-size: 5rem;
            font-weight: 900;
            background: #030f0b;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 220px;
            padding: 10px 35px;
            border-radius: 120px;
            color: #ffdf8c;
            font-family: monospace;
            border: 2px solid #e7bc5e;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px black;
            margin: 20px 0;
        }

        /* خرزات السبحة المتحركة */
        .beads-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 35px 0;
        }

        .bead {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 30% 30%, #f3d27c, #b87c2e);
            border-radius: 50%;
            box-shadow: 0 8px 12px rgba(0,0,0,0.5), inset 0 -5px 0 #6a4a1a, inset 0 2px 8px rgba(255,245,150,0.8);
            transition: all 0.07s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #2f210c;
        }

        .bead:active {
            transform: scale(0.88);
            box-shadow: inset 0 2px 6px #463110;
        }

        .bead.glow-bead {
            box-shadow: 0 0 0 3px #ffde9e, 0 0 0 6px #c9992e;
        }

        .special-reset {
            background: #2f3322;
            border: 1px solid #e5bb5a;
            padding: 14px 38px;
            border-radius: 80px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffeca6;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.1s;
        }

        /* ========== الأذكار بتصميم لوحي ========== */
        .dhikr-royal-list {
            display: grid;
            gap: 18px;
            max-height: 480px;
            overflow-y: auto;
            padding: 5px;
        }

        .dhikr-master-card {
            background: linear-gradient(105deg, #14261f, #0c1c16);
            border-right: 8px solid #efcd7b;
            border-radius: 45px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .dhikr-text-sacred {
            font-size: 1.2rem;
            font-weight: 600;
            color: #faefcf;
            flex: 2;
            line-height: 1.5;
        }

        .count-crystal {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffdf9c;
            font-family: monospace;
            border: 1px solid #b69446;
            min-width: 70px;
            text-align: center;
        }

        .dhikr-action {
            background: #d3a343;
            border: none;
            padding: 8px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1e2d1a;
        }

        .dhikr-action:active {
            transform: scale(0.92);
            background: #b47d2a;
        }

        .footer-azkar {
            text-align: center;
            padding: 16px;
            font-size: 0.85rem;
            color: #bda46b;
            border-top: 1px solid #cba43e;
            background: #03100c70;
        }

        @media (max-width: 600px) {
            .bead { width: 48px; height: 48px; font-size: 1.1rem; }
            .pearl-counter { font-size: 3rem; min-width: 160px; }
            .tab-noble { padding: 8px 12px; font-size: 0.8rem; min-width: 70px; }
            .dhikr-text-sacred { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<div class="mosque-bg"></div>
<div class="mihrab">
    <div class="dome"></div>
    <div class="noble-tabs">
        <button class="tab-noble active" data-tab="royal-tasbeeh">📿 التسبيح النبوي</button>
        <button class="tab-noble" data-tab="royal-morning">🌅 أذكار الفجر</button>
        <button class="tab-noble" data-tab="royal-evening">🌙 أذكار المغيب</button>
        <button class="tab-noble" data-tab="royal-dua">🤲 الدعاء المستجاب</button>
    </div>

    <!-- سبحة خرزات تفاعلية -->
    <div id="royal-tasbeeh" class="sacred-content active">
        <div class="tasbeeh-throne">
            <div class="tasbeeh-glow">❀ سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ❀</div>
            <div class="pearl-counter" id="superCounter">0</div>
            <div class="beads-container" id="beadsGrid"></div>
            <button class="special-reset" id="superReset">⟳ إعادة ضبط التسبيح</button>
        </div>
    </div>

    <div id="royal-morning" class="sacred-content"><div class="dhikr-royal-list" id="morningRoyalList"></div></div>
    <div id="royal-evening" class="sacred-content"><div class="dhikr-royal-list" id="eveningRoyalList"></div></div>
    <div id="royal-dua" class="sacred-content"><div class="dhikr-royal-list" id="duaRoyalList"></div></div>
    <div class="footer-azkar">﴿ فَاذْكُرُونِي أَذْكُرْكُمْ ﴾ — أعلى تقنية روحانية في عصر 2099</div>
</div>

<script>
    // ------------------------- البيانات الموسعة -------------------------
    const masterMorning = [
        { text: "سُبْحَانَ اللَّهِ الْعَظِيمِ وَبِحَمْدِهِ", count: 0 },
        { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ", count: 0 },
        { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا", count: 0 },
        { text: "أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ وَكَلِمَةِ الْإِخْلَاصِ", count: 0 },
        { text: "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ", count: 0 },
        { text: "رَضِيتُ بِاللَّهِ رَبًّا وَبِالْإِسْلَامِ دِينًا", count: 0 },
        { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ عَدَدَ خَلْقِهِ", count: 0 }
    ];

    const masterEvening = [
        { text: "أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ", count: 0 },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ", count: 0 },
        { text: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ", count: 0 },
        { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ", count: 0 },
        { text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ", count: 0 },
        { text: "سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَلَا إِلَهَ إِلَّا اللَّهُ", count: 0 }
    ];

    const masterDua = [
        { text: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً", count: 0 },
        { text: "اللَّهُمَّ اغْفِرْ لِي وَارْحَمْنِي وَتُبْ عَلَيَّ", count: 0 },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ", count: 0 },
        { text: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ", count: 0 },
        { text: "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ", count: 0 },
        { text: "اللَّهُمَّ اجْعَلْنَا مِنَ الذَّاكِرِينَ اللَّهَ كَثِيرًا", count: 0 }
    ];

    let globalTasbeeh = 0;
    let morningState = masterMorning.map(i => ({ ...i }));
    let eveningState = masterEvening.map(i => ({ ...i }));
    let duaState = masterDua.map(i => ({ ...i }));

    // عناصر واجهة السبحة المتطورة
    const counterEl = document.getElementById('superCounter');
    const beadsContainer = document.getElementById('beadsGrid');
    const resetSuper = document.getElementById('superReset');

    function buildBeads(totalCount) {
        if (!beadsContainer) return;
        const beadCount = Math.min(33, Math.floor(totalCount / 10) + 5);
        beadsContainer.innerHTML = '';
        for (let i = 0; i < 33; i++) {
            const bead = document.createElement('div');
            bead.className = 'bead';
            if (i < (totalCount % 33)) bead.classList.add('glow-bead');
            bead.innerHTML = i % 11 === 0 ? '🤲' : '●';
            bead.addEventListener('click', (function(idx) {
                return function() {
                    // الضغط على أي خرزة يضيف تسبيحة سريعة
                    globalTasbeeh++;
                    updateSuperUI();
                    buildBeads(globalTasbeeh);
                };
            })(i));
            beadsContainer.appendChild(bead);
        }
    }

    function updateSuperUI() {
        counterEl.innerText = globalTasbeeh;
        buildBeads(globalTasbeeh);
    }

    resetSuper.addEventListener('click', () => {
        globalTasbeeh = 0;
        updateSuperUI();
    });

    // عرض قوائم الأذكار الديناميكية الفائقة
    function renderRoyalList(containerId, dataArray, prefix) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        dataArray.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'dhikr-master-card';
            card.innerHTML = `
                <div class="dhikr-text-sacred">📖 ${item.text}</div>
                <div class="count-crystal" id="${prefix}-badge-${idx}">${item.count}</div>
                <button class="dhikr-action" data-prefix="${prefix}" data-idx="${idx}">+ ذكر</button>
            `;
            container.appendChild(card);
        });

        document.querySelectorAll(`.dhikr-action[data-prefix="${prefix}"]`).forEach(btn => {
            btn.addEventListener('click', (e) => {
                const p = btn.getAttribute('data-prefix');
                const i = parseInt(btn.getAttribute('data-idx'));
                if (p === 'morning') {
                    morningState[i].count++;
                    document.getElementById(`morning-badge-${i}`).innerText = morningState[i].count;
                } else if (p === 'evening') {
                    eveningState[i].count++;
                    document.getElementById(`evening-badge-${i}`).innerText = eveningState[i].count;
                } else if (p === 'dua') {
                    duaState[i].count++;
                    document.getElementById(`dua-badge-${i}`).innerText = duaState[i].count;
                }
                btn.style.transform = 'scale(0.92)';
                setTimeout(() => btn.style.transform = '', 90);
            });
        });
    }

    function refreshWholeZikr() {
        renderRoyalList('morningRoyalList', morningState, 'morning');
        renderRoyalList('eveningRoyalList', eveningState, 'evening');
        renderRoyalList('duaRoyalList', duaState, 'dua');
    }

    // التابات المتقدمة
    function switchSacredTab(tabId) {
        document.querySelectorAll('.sacred-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-noble').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.tab-noble[data-tab="${tabId}"]`).classList.add('active');
    }

    document.querySelectorAll('.tab-noble').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-tab');
            if (target) switchSacredTab(target);
        });
    });

    // لمسة إضافية: نقر على العداد يضيف تسبيحة احترافية
    counterEl.addEventListener('click', () => {
        globalTasbeeh += 5;
        updateSuperUI();
    });

    // تشغيل أولي
    refreshWholeZikr();
    updateSuperUI();
</script>
</body>
</html>
